<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accio Jobs</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            background-color:#f4f6f8;
        }

        main{
            text-align:center;
            padding:40px;
            background:white;
            border-radius:10px;
            box-shadow:0 4px 10px rgba(0,0,0,0.1);
            width:90%;
            max-width:600px;
        }

        h1{
            font-size:2rem;
            color:#333;
        }

        @media (max-width:600px){
            h1{
                font-size:1.5rem;
            }
        }
    </style>
</head>

<body>

    <main>
        <h1>Welcome to Accio Jobs!</h1>
    </main>

</body>
</html>
